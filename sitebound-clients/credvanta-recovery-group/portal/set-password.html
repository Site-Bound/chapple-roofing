<!DOCTYPE html>
<html lang="en-GB">
<head>
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-KJDW8ZRD');</script>
  <!-- End Google Tag Manager -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password | Credvanta Recovery Group</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="stylesheet" href="/portal/css/portal.css">
</head>
<body class="auth-page" data-page="set-password">
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KJDW8ZRD"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <div class="auth-card">
    <div class="auth-card-header">
      <img src="/images/credvanta-logo.png" alt="Credvanta Recovery Group" class="auth-logo">
      <p>Client Portal</p>
    </div>

    <div class="auth-card-body" id="set-password-form-wrap">
      <h2>Set a new password</h2>
      <p class="auth-subtitle">Choose a new password for your account. It must be at least 8 characters.</p>

      <div class="alert alert-error" id="set-password-error" hidden>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 8v4m0 4h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span id="set-password-error-text">Something went wrong.</span>
      </div>

      <form id="set-password-form" novalidate>
        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" name="newPassword"
            autocomplete="new-password" minlength="8" required>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirmPassword"
            autocomplete="new-password" minlength="8" required>
        </div>
        <button type="submit" class="btn btn-primary" id="set-password-btn">Set Password</button>
      </form>
    </div>

    <div class="auth-card-body" id="set-password-invalid-wrap" style="display:none">
      <div style="text-align:center;padding:8px 0">
        <div class="success-icon" style="margin:0 auto 16px;background:rgba(220,38,38,.1)">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" style="color:#DC2626"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 8v4m0 4h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <h2 style="color:var(--navy);margin-bottom:8px">Link expired or invalid</h2>
        <p style="color:var(--gray-600);font-size:.875rem;margin-bottom:20px">
          This password reset link has expired or has already been used. Reset links are valid for one hour.
        </p>
        <a href="/portal/reset" class="btn btn-primary" style="display:inline-block;text-decoration:none">Request a new link</a>
      </div>
    </div>

    <div class="auth-footer">
      <a href="/portal/">← Back to sign in</a>
    </div>
  </div>

  <script src="/portal/js/portal.js"></script>
</body>
</html>
