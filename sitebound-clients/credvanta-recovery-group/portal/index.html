<body class="auth-page" data-page="login">
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KJDW8ZRD"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <div class="auth-card">
    <div class="auth-card-header">
      <img src="/images/credvanta-logo.png" alt="Credvanta Recovery Group" class="auth-logo">
      <p>Client Portal</p>
    </div>

    <div class="auth-card-body">
      <h2>Sign in to your account</h2>
      <p class="auth-subtitle">Enter your client reference and password to continue.</p>

      <div class="alert alert-error" id="login-error" hidden>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 8v4m0 4h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span id="login-error-text">Invalid credentials.</span>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="client-ref">Client Reference</label>
          <input type="text" id="client-ref" name="clientRef" placeholder="e.g. CRG-001"
            autocomplete="username" autocapitalize="characters" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
            autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-primary" id="login-btn">
          Sign In
        </button>
      </form>
    </div>

    <div class="auth-footer">
      <p><a href="/portal/reset">Forgot your password?</a></p>
      <p>Don't have an account? <a href="/index.html#claim-form">Submit a claim to get started</a></p>
    </div>
  </div>

  <script src="/portal/js/portal.js"></script>
</body>
</html>
