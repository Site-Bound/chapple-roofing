  <style>
    .pc-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: var(--off-white);
    }
    .pc-card {
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .pc-icon {
      width: 64px;
      height: 64px;
      background: #F0FDF4;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .pc-card h1 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 12px;
    }
    .pc-card p {
      font-size: 0.95rem;
      color: var(--gray-600);
      line-height: 1.7;
      margin-bottom: 8px;
    }
    .pc-ref {
      background: var(--off-white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 10px 16px;
      font-size: 0.85rem;
      color: var(--gray-600);
      margin: 16px 0 28px;
      display: none;
      text-align: left;
      line-height: 2;
    }
    .pc-ref strong { color: var(--navy); }
    .pc-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .pc-actions .btn { min-width: 160px; }
    @media (max-width: 480px) {
      .pc-card { padding: 32px 20px; }
      .pc-card h1 { font-size: 1.35rem; }
    }
  </style>

<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KJDW8ZRD"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <div class="pc-wrap">
    <div class="pc-card">
      <div class="pc-icon" id="pc-icon">
        <!-- Icon swapped by JS based on outcome (success / declined / error) -->
      </div>
      <h1 id="pc-title">Processing your payment…</h1>
      <p id="pc-message-primary">Please wait a moment.</p>
      <p id="pc-message-secondary" style="display:none"></p>
      <div class="pc-ref" id="pc-ref-block">
        <strong>Reference:</strong> <span id="pc-ref-val">—</span><br>
        <span id="pc-auth-row" style="display:none"><strong>Authorisation Code:</strong> <span id="pc-auth-val">—</span></span>
      </div>
      <p style="font-size:0.82rem;color:var(--gray-400);margin-bottom:28px">
        If you have any questions please call us on <a href="tel:08009757066" style="color:var(--blue)">0800 975 7066</a>.
      </p>
      <div class="pc-actions" id="pc-actions">
        <a href="/debtor.html" class="btn btn-outline">Return to Portal</a>
        <a href="/" class="btn btn-primary">Credvanta Home</a>
      </div>
    </div>
  </div>

  <script>
    /* Render success / declined / error UI based on the query string
       set by /payment-complete (the Function endpoint that received
       Taylr's POST and verified the signature server-side). */
    (function() {
      const params  = new URLSearchParams(window.location.search);
      const status  = params.get('status') || '';
      const orderRef = params.get('orderRef') || '';
      const message  = params.get('responseMessage') || '';
      const amount   = params.get('amount') || '';
      const authCode = params.get('authorisationCode') || '';

      const iconBox      = document.getElementById('pc-icon');
      const titleEl      = document.getElementById('pc-title');
      const primary      = document.getElementById('pc-message-primary');
      const secondary    = document.getElementById('pc-message-secondary');
      const refBlock     = document.getElementById('pc-ref-block');
      const refVal       = document.getElementById('pc-ref-val');
      const authRow      = document.getElementById('pc-auth-row');
      const authVal      = document.getElementById('pc-auth-val');
      const actions      = document.getElementById('pc-actions');

      const ICON_SUCCESS = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M22 11.08V12a10 10 0 11-5.93-9.14" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 4L12 14.01l-3-3" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      const ICON_FAIL    = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#dc2626" stroke-width="2.5"/><path d="M15 9l-6 6M9 9l6 6" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/></svg>';
      const ICON_INFO    = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#1851C4" stroke-width="2.5"/><path d="M12 8v4m0 4h.01" stroke="#1851C4" stroke-width="2.5" stroke-linecap="round"/></svg>';

      function setIconBg(hex) { iconBox.style.background = hex; }

      if (status === 'success') {
        iconBox.innerHTML = ICON_SUCCESS;
        setIconBg('#F0FDF4');
        titleEl.textContent = 'Payment Received';
        primary.textContent = 'Thank you — your payment has been processed successfully.';
        secondary.textContent = 'A receipt will be sent to your email address shortly. Please keep this for your records.';
        secondary.style.display = '';
      } else if (status === 'declined') {
        iconBox.innerHTML = ICON_FAIL;
        setIconBg('#FEF2F2');
        titleEl.textContent = 'Payment Declined';
        primary.textContent = 'Your card issuer declined this transaction. No funds have been taken.';
        secondary.textContent = message
          ? 'Reason: ' + message + '. Please try a different card, or contact your bank for more information.'
          : 'Please try a different card, or contact your bank for more information.';
        secondary.style.display = '';
        // Replace primary action with "Try again"
        actions.innerHTML = '<a href="/debtor.html" class="btn btn-primary">Try a different card</a><a href="/" class="btn btn-outline">Credvanta Home</a>';
      } else if (status === 'error') {
        iconBox.innerHTML = ICON_INFO;
        setIconBg('#EFF6FF');
        titleEl.textContent = 'Payment Could Not Be Processed';
        primary.textContent = 'We were unable to verify your payment. If a charge appears on your account, please contact us so we can investigate.';
        secondary.textContent = message ? 'Details: ' + message : '';
        secondary.style.display = message ? '' : 'none';
        actions.innerHTML = '<a href="/debtor.html" class="btn btn-primary">Return to Portal</a><a href="tel:08009757066" class="btn btn-outline">Call 0800 975 7066</a>';

        // Diagnostic section — only visible to the operator during debugging.
        // Shows first 8 chars of supplied vs computed hash + key length so we
        // can identify whether the Cloudflare env var or the algorithm is at
        // fault without needing log access. Remove once issue is resolved.
        const _s = params.get('_s'), _c = params.get('_c');
        if (_s && _c) {
          const box = document.createElement('div');
          box.style.cssText = 'margin-top:20px;padding:10px 14px;background:#f3f4f6;border-radius:8px;font-size:0.72rem;color:#6b7280;font-family:monospace;text-align:left;line-height:1.8';
          const _x = params.get('_x') || 'none';
          box.innerHTML = '<strong style="color:#374151">Diagnostic (share with support):</strong><br>'
            + 'Supplied: <strong>' + _s + '</strong> &nbsp; Computed: <strong>' + _c + '</strong><br>'
            + 'Key length: ' + (params.get('_k') || '?') + ' &nbsp; Fields: ' + (params.get('_n') || '?') + '<br>'
            + 'Extra fields: <strong>' + _x + '</strong>';
          document.querySelector('.pc-card').appendChild(box);
        }
      } else {
        // No status param — likely a stale bookmark / direct visit
        iconBox.innerHTML = ICON_INFO;
        setIconBg('#EFF6FF');
        titleEl.textContent = 'Payment Portal';
        primary.textContent = 'There is no recent transaction to display.';
        secondary.style.display = 'none';
      }

      if (orderRef) {
        refVal.textContent = orderRef;
        refBlock.style.display = 'block';
      }
      if (authCode) {
        authVal.textContent = authCode;
        authRow.style.display = '';
      }
    })();
  </script>

  <script src="js/cookies.js"></script>
</body>
</html>
